name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: i18n ja/en parity check
        run: npm run i18n:check
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Unit/component tests
        run: npm test
      - name: Build
        run: npm run build
