name: preview-cleanup

# Tear down a PR's web preview: remove the tag, then delete its revisions. No
# database is involved. Runs on PR close; workflow_dispatch lets the owner reclaim
# a leaked preview by number from the Actions tab.

on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number whose preview should be torn down
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: crafton-dev-500709
      REGION: asia-northeast1
      SERVICE: crafton-web-dev
      WIF_PROVIDER: projects/784671749504/locations/global/workloadIdentityPools/github-actions/providers/github
      DEPLOYER_SA: crafton-deployer@crafton-dev-500709.iam.gserviceaccount.com
      PR: ${{ github.event.inputs.pr_number || github.event.number }}
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      # The tag must be removed before its revision can be deleted.
      - name: Remove preview tag
        run: |
          gcloud run services update-traffic "$SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" \
            --remove-tags "pr${PR}" --quiet || echo "no tag pr${PR}"

      # Cloud Run refuses to delete a service's *latest-created* revision
      # (FAILED_PRECONDITION); if this preview was the last deploy, its revision
      # lingers until a newer deploy supersedes it. Harmless — untagged, no traffic,
      # scales to zero — so this step is best-effort and never fails the job.
      - name: Delete preview revisions
        run: |
          revs=$(gcloud run revisions list --service "$SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" \
            --filter="metadata.name ~ ^${SERVICE}-pr${PR}-" \
            --format='value(metadata.name)')
          if [ -z "$revs" ]; then echo "no revisions for pr${PR}"; fi
          for r in $revs; do
            echo "deleting revision $r"
            gcloud run revisions delete "$r" \
              --project "$PROJECT_ID" --region "$REGION" --quiet || true
          done
