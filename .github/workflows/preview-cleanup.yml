name: preview-cleanup

# Tear down a PR's web preview: delete the standalone `crafton-web-dev-pr<N>`
# service. No database is involved. Runs on PR close; workflow_dispatch lets the
# owner reclaim a leaked preview by number from the Actions tab.

on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number whose preview should be torn down
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: crafton-dev-500709
      REGION: asia-northeast1
      BASE_SERVICE: crafton-web-dev
      WIF_PROVIDER: projects/784671749504/locations/global/workloadIdentityPools/github-actions/providers/github
      DEPLOYER_SA: crafton-deployer@crafton-dev-500709.iam.gserviceaccount.com
      PR: ${{ github.event.inputs.pr_number || github.event.number }}
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      # Delete the whole standalone preview service (revisions and all). Best-effort
      # so a re-run on an already-clean PR still succeeds.
      - name: Delete preview service
        run: |
          gcloud run services delete "${BASE_SERVICE}-pr${PR}" \
            --project "$PROJECT_ID" --region "$REGION" --quiet \
            || echo "service ${BASE_SERVICE}-pr${PR} already gone"
